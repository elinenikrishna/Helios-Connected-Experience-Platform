apiVersion: apps/v1
kind: Deployment
metadata: { name: helios-frontend }
spec:
  replicas: 2
  selector: { matchLabels: { app: helios-frontend } }
  template:
    metadata: { labels: { app: helios-frontend } }
    spec:
      containers:
        - name: frontend
          image: helios-frontend:latest
          ports: [{ containerPort: 3000 }]
