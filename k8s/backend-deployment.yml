apiVersion: apps/v1
kind: Deployment
metadata: { name: helios-backend }
spec:
  replicas: 2
  selector: { matchLabels: { app: helios-backend } }
  template:
    metadata: { labels: { app: helios-backend } }
    spec:
      containers:
        - name: backend
          image: helios-backend:latest
          ports: [{ containerPort: 8080 }]
