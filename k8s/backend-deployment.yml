apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helios-backend
  template:
    metadata:
      labels:
        app: helios-backend
    spec:
      containers:
        - name: helios-backend
          image: helios/device-cloud-backend:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: helios-backend-service
spec:
  selector:
    app: helios-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
