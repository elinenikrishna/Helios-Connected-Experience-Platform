spring:
  application:
    name: helios-connected-device-cloud
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
helios:
  kafka:
    topics:
      telemetry: helios.telemetry.received
      command: helios.command.sent
      alert: helios.alert.generated
